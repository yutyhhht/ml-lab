<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Columns</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">
        <div class="row mt-2">


            <div class="col-md-4 bg-primary text-white p-3 text-center">
                col1


            </div>
            <div class="col-md-4 bg-light text-dark p-3 text-center">
                col2
            </div>
            <div class="col-md-4 bg-success text-warning p-3 text-center">
                col3
            </div>
        </div>
        <div class="row mt-2">
            <div class="col-md-6 bg-warning text-dark p-3 text-center">
                column 1
            </div>
            <div class="col-md-6 bg-light text-success p-3 text-center">
                column 2
            </div>
        </div>
</body>
