<!DOCTYPE html>
<html>

<head>
    <title>To-Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mb-4">To-Do List (Bootstrap Demo)</h2>

        <ul class="list-group">

            <li class="list-group-item d-flex justify-content-between align-items-center">
                Buy Groceries
                <div>
                    <button class="btn btn-success btn-sm me-2">Done</button>
                    <button class="btn btn-danger btn-sm">Remove</button>
                </div>
            </li>

            <li class="list-group-item d-flex justify-content-between align-items-center">
                Pay Bills
                <div>
                    <button class="btn btn-success btn-sm me-2">Done</button>
                    <button class="btn btn-danger btn-sm">Remove</button>
                </div>
            </li>

            <li class="list-group-item d-flex justify-content-between align-items-center">
                Finish Assignment
                <div>
                    <button class="btn btn-success btn-sm me-2">Done</button>
                    <button class="btn btn-danger btn-sm">Remove</button>
                </div>
            </li>

            <li class="list-group-item d-flex justify-content-between align-items-center">
                Call Friend
                <div>
                    <button class="btn btn-success btn-sm me-2">Done</button>
                    <button class="btn btn-danger btn-sm">Remove</button>
                </div>
            </li>

        </ul>
    </div>

</body>

</html>
