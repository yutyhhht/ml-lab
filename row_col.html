<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gutter Example</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <div class="row g-3">
            <div class="col-md-4 bg-primary text-white p-3 text-center">col1</div>
            <div class="col-md-4 bg-success text-white p-3 text-center">col2</div>
            <div class="col-md-4 bg-warning text-dark p-3 text-center">col3</div>
        </div>

        <br>

        <div class="row gx-5">
            <div class="col-md-6 bg-secondary text-white p-3 text-center">column 1</div>
            <div class="col-md-6 bg-info text-dark p-3 text-center">column 2</div>
        </div>

        <br>

        <div class="row gy-4">
            <div class="col-md-6 bg-danger text-white p-3 text-center">column A</div>
            <div class="col-md-6 bg-dark text-white p-3 text-center">column B</div>
        </div>

    </div>

</body>

</html>
