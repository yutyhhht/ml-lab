<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bootstrap Mini Challenge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header class="container-fluid bg-dark text-white p-4">
        <h2 class="text-center">My Website Header</h2>
    </header>

    <!-- Main Content -->
    <main class="container bg-light p-4 my-4">
        <h3>Main Content Area</h3>
        <p>
            This section uses the <strong>.container</strong> class.
            It stays centered and changes width at different breakpoints.
        </p>
        <p>
            Resize the browser window to observe how the layout behaves.
        </p>
    </main>

    <!-- Footer -->
    <footer class="container-fluid bg-secondary text-white p-3">
        <p class="text-center mb-0">
            © 2026 My Website | Footer Section
        </p>
    </footer>

</body>

</html>
