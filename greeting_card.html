<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Birthday Greeting Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="mb-4 text-center fw-bold text-warning">Happy Birthday </h1>
                <div class="card text-center p-5 shadow border border-3 border-primary rounded-4">
                    <h3 class="fw-bold text-success">Dear Friend,</h3>
                    <p class="mb-2">
                        Wishing you a day filled with happiness, laughter,
                        and unforgettable memories.
                    </p>
                    <p class="fw-bold text-primary">
                        May all your dreams come true!
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
