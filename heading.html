<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<title> My first bootstrap page </title>
<div class="container">
    <!-- Normal html headings -->
    <h1> HTML Heading h1</h1>
    <h2> HTML Heading h2</h2>
    <h3> HTML Heading h3</h3>
    <h4> HTML Heading h4</h4>
    <hr>
    <!-- bootstrap heading classes -->
    <p class="h1"> Bootstrap Heading .h1</p>
    <p class="h2"> Bootstrap Heading .h2</p>
    <p class="h3"> Bootstrap Heading .h3</p>
    <p class="h4"> Bootstrap Heading .h4</p>
    <hr>
    <!-- bootstrap display heading-->
    <h1 class="display-1">Display heading 1</h1>
    <h1 class="display-2">Display heading 2</h1>
    <h1 class="display-3">Display heading 3</h1>
    <h1 class="display-4">Display heading 4</h1>
</div>
</body>

</html>
